spack:
# They are currently buildable,
# because cray-libsci and cray-fftw are not in use (see packages.yaml)
  packages:
    'fftw-api:':
      buildable: true
  definitions:

  - parallel:
    - blaspp@2024.10.26 +cuda cuda_arch=90 build_type=Release ^openblas%gcc ^cmake ~doc~qtgui %gcc
    # hpx is failing to build due to error  >> 1745    "/usr/include/c++/12/bits/stl_pair.h", line 191: error: incomplete type "boost::spirit::info" is not allowed
    - hpx@1.9.1 +cuda cuda_arch=90 +async_mpi malloc=jemalloc max_cpu_count=128 networking=mpi 
      build_type=Release ^boost %gcc ^cmake ~doc~qtgui %gcc ^asio %gcc
    # rather silly kokkos has std=98,11, etc setting cxxstd. BUT all other packages 
    # use the flag cxxstd ... Update in recipes might fix this but for the moment, we fix 
    # this in our repo
    # cxxstd=14 is not a variant in kokkos@3.7.02
    - kokkos@4.4.01 +cuda cuda_arch=90 +hwloc +memkind +numactl +openmp +tuning +wrapper build_type=Release ^cmake ~doc~qtgui %gcc
    # for hpx must explicitly set openmp off 
    - kokkos@4.4.01 +cuda cuda_arch=90 +wrapper +hwloc +memkind +numactl +hpx +hpx_async_dispatch +tuning ~openmp
      build_type=Release ^hpx@1.9.1 +async_mpi max_cpu_count=128 networking=mpi build_type=Release ^cmake ~doc~qtgui %gcc
    - magma ~rocm +cuda cuda_arch=90
    # seems like slate can't compile with cuda due to openmp taskloops not implemented in cuda compiler. And needs nvcc,nvc++ for cuda to be enabled.
    # - slate@2024.10.29 +cuda cuda_arch=90 build_type=Release
    # plasma relies on taskloops and other openmp that is not available with cuda 12.6 and gcc 12.3:
    #- plasma@23.8.2 build_type=Release ^openblas
    # some heavier numerical library builds
    # open has cmake error with cuda?! and master can't be patched  
    #- opencv@4.10.0 +cuda cuda_arch=90 build_type=Release

    # trilinos is failling because llvm is failing to build with gcc with unusual error 
    # CMake Error in /tmp/pawsey0001/pelahi/setonix-q/2025.08/software/pelahi/build_stage/spack-stage-llvm-19.1.3-ooawzq6pavkbkt3v4bl57almvctwubay/spack-src/lldb/source/Host/CMakeLists.txt:
    # Imported target "LibXml2::LibXml2" includes non-existent path
    # - trilinos@16.0.0 +cuda cuda_arch=90 +adios2 +openmp +python ^adios2@2.9.2 build_type=Release ^hdf5@1.14.3 build_type=Release ^adios2%gcc ^binder%gcc ^py-mpi4py%gcc ^python-venv%gcc ^llvm%gcc
    # - trilinos@15.1.0 ~rocm +adios2 +openmp +python +tpetra +kokkos +zoltan ~cuda ^adios2@2.9.2 build_type=Release failed with /usr/include/stdlib.h:31:10: fatal error: 'stddef.h' file not found
    # - trilinos@16.0.0 ~rocm +adios2 +openmp +python +tpetra +kokkos +zoltan ~cuda ^adios2@2.9.2 build_type=Release

  - petsc-set:
    # TODO: currently unable to configure petsc with trilinos.
    # not clear if issue is with petsc or the version of trilinos
    # for the moment trilinos disabled
    # - petsc@3.15.5 +fftw +trilinos +hwloc +openmp +complex ~cuda
    # - petsc@3.21.1 +fftw +hwloc +openmp +cuda cuda_arch=90
  specs:
  - matrix:
    - [$parallel]
    - ['%nvhpc@24.11']
    - [^python@3.11.6%gcc@12.3.0]
  view: false
