spack:
# note: preferred versions are set in packages.yaml
  definitions:
  - packages:
# py-pip and py-setuptools: installed in env_langs
# snakemake: docs recommend to install with conda
    - ffmpeg@7.0.2 +doc +drawtext +libaom +libmp3lame +libopenjpeg +libopus +libsnappy +libspeex +libvorbis +libvpx +libwebp +libxml2 +libzmq +lzma +nonfree +openssl +sdl2
    - gnuplot@6.0.0
## for now    - llvm@15.0.4 ~polly ~gold # Ilkhom: ~omp_as_runtime variant is removed from spack/0.21.0
    - nextflow@22.10.0 #supports DSL-1
    - nextflow@24.10.0 #supports DSL-2
    - parallel@20240822
    - mpifileutils@0.11.1+lustre
    - feh@3.10
    - nano@8.2
    - cmake@3.31.7
    - meson@1.5.1
    - perl-data-dumper@2.173 
  - gpu-packages:
    - nvtop +cuda cuda_arch=90
  specs:
  - matrix:
    - [$packages]
    - ['%gcc@12.3.0']
  - matrix:
    - [$gpu-packages]
    - ['%nvhpc@24.11']
  view: false
