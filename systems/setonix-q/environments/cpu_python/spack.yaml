spack:
# fixing some versions to have only one version per package in this environment
# note: these preferred versions are now set in packages.yaml
  definitions:
  - packages:
    - py-cython@3.0.8
    - py-dask@2023.4.1
    - py-h5netcdf@1.3.0 ^py-setuptools-scm@8.0.4 ^py-setuptools@69.2.0
    - py-h5py@3.11.0
    - py-ipython@8.14.0
    - py-matplotlib@3.8.4 +movies
    - py-mpi4py@4.0.1 +gtl gtl_backend=cuda gtl_lib_path=/opt/cray/pe/mpich/8.1.33/ofi/gnu/12.3/lib
    # py-numpy: using spack's recipe
    - py-numpy@1.26.4
    - py-numpy@2.1.2
    - py-pandas@2.2.2
    - py-plotly@5.20.0
    - py-scikit-learn@1.4.2
    - py-scipy@1.13.0
    - py-pydantic@2.7.4
    - py-rich@13.7.1
    - py-numba@0.58.1

  # need these here, too, for the python collection
  - utilities:
    - py-pip@23.1.2
    - py-setuptools@59.4.0
    - py-setuptools@70.1.0

  specs:
  - matrix:
    - [$packages, $utilities]
    - [^python@3.11.6 +optimizations+zlib]
    - ['%gcc@12.3.0']
  view: false
