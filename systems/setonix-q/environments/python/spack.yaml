spack:

  packages:
    python:
      require: "@3.11.6 ~ssl +optimizations +zlib %gcc@12.3.0"
  
    py-numpy:
      require: "@2.1.2"
  
    cutensor:
      buildable: true
      version: [2.4.1.4]
      externals: []
  
  definitions:
  - py_packages:
    - py-numpy
    - py-scipy@1.14.1
    - py-matplotlib@3.9.2 +movies
    - py-cython@3.2.0
    - py-mpi4py@4.0.1 +gtl gtl_backend=cuda gtl_lib_path=/opt/cray/pe/mpich/8.1.33/ofi/gnu/12.3/lib
    - py-h5py@3.12.1 +mpi
    - py-h5netcdf@1.3.0 ^py-setuptools-scm@8.0.4 ^py-setuptools@69.2.0
    - py-numba@0.61.0
    - py-cuda-python@12.9.5
    - py-cupy@13.4.0 +cuda cuda_arch=90
    - py-numba-cuda@0.24
    - py-nvmath-python@0.6.0 +cu12 +distributed +dx
    - py-pandas@2.2.3
    - py-pydantic@2.7.4
    - py-rich@13.7.1
    - py-scikit-learn@1.5.2

  - utilities:
    - py-pip@23.1.2
    - py-setuptools@80.0.0

  - py_stack:
    - $py_packages
    - $utilities

  specs:
  - cutensor@2.4.1.4

  - matrix:
    - [$py_stack]
    - ["^python@3.11.6+optimizations+zlib~ssl"]
    - ["%gcc@12.3.0"]

  view: false
