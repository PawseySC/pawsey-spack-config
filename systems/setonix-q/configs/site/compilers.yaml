compilers:

# ===================================================================
#                        NVIDIA 
# ===================================================================
- compiler:
    spec: nvhpc@24.11
    paths:
      cc: cc
      cxx: CC
      f77: ftn
      fc: ftn
    flags:
      cflags: -O3
      cxxflags: -O3
      cppflags: -O3
      fflags: -O3
    operating_system: sles15
    target: aarch64
    modules:
    - PrgEnv-nvidia
    - gcc-native-mixed/12.3
    - craype
    - craype-arm-grace
    - craype-network-ofi
    - xpmem
    environment:
      set:
        PE_ENV: "NVIDIA"
    extra_rpaths: []
- compiler:
    spec: gcc@12.3.0
    paths:
      cc: cc
      cxx: CC
      f77: ftn
      fc: ftn
    flags:
      cflags: -O3
      cxxflags: -O3
      cppflags: -O3
      fflags: -O3
    operating_system: sles15
    target: aarch64
    modules:
    - PrgEnv-gnu
    - gcc-native-mixed/12.3
    - craype
    - craype-arm-grace
    - craype-network-ofi
    - xpmem
    environment:
      set:
        PE_ENV: "GNU"
    extra_rpaths: []
